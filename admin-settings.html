<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Setting Admin Demo | AlfindoTech</title>
    <script>
        (function () {
            if (localStorage.getItem('alfAdminDemoAuth') !== 'true') location.href = './admin-login.html';
            var compact = window.matchMedia('(max-width: 991.98px)').matches;
            var key = compact ? 'alfAdminDemoSidebarMobile' : 'alfAdminDemoSidebarDesktop';
            var state = localStorage.getItem(key) || (compact ? 'collapsed' : 'expanded');
            document.documentElement.classList.add('admin-sidebar-' + state);
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
</head>
<body class="admin-body">
    <div class="admin-shell">
        <aside class="admin-sidebar">
            <div class="admin-sidebar-head">
                <a class="brand-mark" href="./admin-dashboard.html">
                    <span class="brand-icon"><i class="fa-solid fa-shield-halved"></i></span>
                    <span>AdminTech</span>
                </a>
                <button class="admin-nav-toggle" type="button" data-admin-sidebar-toggle aria-label="Buka tutup navbar admin">
                    <i class="fa-solid fa-bars"></i>

            </div>
            <nav class="admin-menu">
                <a href="./admin-dashboard.html"><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a>
                <a href="./admin-services.html"><i class="fa-solid fa-screwdriver-wrench"></i><span>Layanan</span></a>
                <a href="./admin-products.html"><i class="fa-solid fa-box-open"></i><span>Produk</span></a>
                <a href="./admin-product-categories.html"><i class="fa-solid fa-layer-group"></i><span>Kategori</span></a>
                <a href="./admin-packages.html"><i class="fa-solid fa-tags"></i><span>Paket</span></a>
                <a href="./admin-portfolio.html"><i class="fa-solid fa-images"></i><span>Portfolio</span></a>
                <a href="./admin-testimonials.html"><i class="fa-solid fa-star"></i><span>Testimoni</span></a>
                <a href="./admin-faqs.html"><i class="fa-solid fa-circle-question"></i><span>FAQ</span></a>
                <a href="./admin-leads.html"><i class="fa-solid fa-inbox"></i><span>Leads</span></a>
                <a class="active" href="./admin-settings.html"><i class="fa-solid fa-gear"></i><span>Setting</span></a>
            </nav>
            <div class="admin-sidebar-actions">

                <button class="admin-action-link admin-action-danger" type="button" data-admin-logout><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></button>
            </div>
        </aside>

        <main class="admin-main">
            <header class="admin-topbar">
                <div>
                    <span class="admin-kicker">AlfindoTech CMS</span>
                    <h1>Setting</h1>
                </div>
            </header>

            <section class="admin-panel">
                <div class="admin-panel-head">
                    <div>
                        <h2>Setting Website</h2>
                        <p>Preview pengaturan umum yang di versi Laravel tersimpan ke database.</p>
                    </div>
                </div>
                <form class="admin-form" id="settingForm">
                    <div class="row g-3">
                        <div class="col-md-6"><label>Nama Perusahaan</label><input class="form-control" name="company_name" value="AlfindoTech"></div>
                        <div class="col-md-6"><label>WhatsApp</label><input class="form-control" name="whatsapp" value="6282118690455"></div>
                        <div class="col-md-6"><label>Email</label><input class="form-control" value="info@alfindotech.biz.id"></div>
                        <div class="col-md-6"><label>Telepon</label><input class="form-control" value="(+62) 821-1869-0455"></div>
                        <div class="col-md-6"><label>Kantor Depok</label><input class="form-control" value="Jl. Tole Iskandar No.9, Kota Depok"></div>
                        <div class="col-md-6"><label>Kantor Tangerang</label><input class="form-control" value="Jl. Kartika VII No.9, Kota Tangerang"></div>
                        <div class="col-12"><label>Hero Title</label><textarea class="form-control" rows="3" name="hero_title">Your Best Security Technology Solution</textarea></div>
                        <div class="col-12"><label>SEO Description</label><textarea class="form-control" rows="3">Solusi CCTV, access door, security alarm, maintenance, dan otomasi keamanan untuk rumah serta bisnis.</textarea></div>
                    </div>
                    <div class="admin-actions"><button class="btn btn-primary" type="submit">Simpan Demo</button></div>

            </section>

    <script src="./admin-demo.js"></script>
